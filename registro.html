<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Registro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-6">

<div class="card shadow">

<div class="card-body">

<h2 class="text-center text-success">
Crear cuenta
</h2>

<div class="mb-3">

<label>Nombre</label>

<input
id="nombre"
class="form-control">

</div>

<div class="mb-3">

<label>Email</label>

<input
id="email"
type="email"
class="form-control">

</div>

<div class="mb-3">

<label>Contraseña</label>

<input
id="password"
type="password"
class="form-control">

</div>

<button
class="btn btn-success w-100"
onclick="registrar()">

Registrarse

</button>

<p class="text-center mt-3">

¿Ya tenés cuenta?

<a href="login.html">

Iniciar sesión

</a>

</p>

</div>

</div>

</div>

</div>

</div>

<script src="js/auth.js"></script>

</body>

</html>
